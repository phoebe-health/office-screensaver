<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phoebe · Office Dashboards</title>
    <link rel="icon" href="./flower-mark.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --iris-500: #5e3cff; --ink-900: #0c1e2b; --ink-400: #7a8da0;
        --ink-100: #e8edf2; --paper: #faf4ec; --snow: #ffffff;
      }
      html, body { height: 100%; margin: 0;
        background: linear-gradient(180deg, #ffffff, #fbf6ef);
        color: var(--ink-900);
        font-family: 'Satoshi', ui-sans-serif, system-ui, sans-serif; }
      .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 2.5rem; padding: 3rem; }
      .brand { display: flex; align-items: center; gap: .6rem; }
      .brand img { width: 38px; height: 38px; border-radius: 10px; }
      .brand span { font-weight: 700; font-size: 1.4rem; letter-spacing: -0.01em; }
      h1 { font-weight: 700; font-size: clamp(1.5rem, 3vw, 2.4rem); margin: .25rem 0 0;
        letter-spacing: -0.02em; text-align: center; }
      .sub { color: var(--ink-400); margin: .35rem 0 0; text-align: center;
        text-transform: uppercase; letter-spacing: .14em; font-size: .8rem; font-weight: 700; }
      .cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
      a.card { display: block; width: 340px; max-width: 90vw; padding: 2rem; border-radius: 26px;
        text-decoration: none; color: var(--ink-900); border: 1px solid var(--ink-100);
        background: var(--snow); box-shadow: 0 10px 24px -8px rgba(12,30,43,.12);
        transition: transform .2s, border-color .2s; }
      a.card:hover { transform: translateY(-4px); border-color: var(--iris-500); }
      a.card .emoji { font-size: 2.25rem; }
      a.card h2 { margin: .75rem 0 .25rem; font-size: 1.35rem; font-weight: 700; }
      a.card p { margin: 0; color: var(--ink-400); font-size: .95rem; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div style="text-align:center">
        <div class="brand" style="justify-content:center">
          <img src="./flower-mark.svg" alt="" />
          <span>phoebe</span>
        </div>
        <h1>Office Dashboards</h1>
        <p class="sub">Live from production · fun, not exact</p>
      </div>
      <div class="cards">
        <a class="card" href="./token-burner.html">
          <div class="emoji">🔥</div>
          <h2>Token Burner</h2>
          <p>Watch Phoebe burn LLM tokens in real time.</p>
        </a>
        <a class="card" href="./texts.html">
          <div class="emoji">🌎</div>
          <h2>Live Texts</h2>
          <p>Messages Phoebe sends, lighting up the map.</p>
        </a>
      </div>
    </div>
  </body>
</html>
