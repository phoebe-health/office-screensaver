<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phoebe · Office Dashboards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body { height: 100%; margin: 0; background: #050507; color: #fff;
        font-family: 'DM Sans', system-ui, sans-serif; }
      .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 2.5rem; padding: 3rem; }
      h1 { font-weight: 800; font-size: clamp(1.5rem, 3vw, 2.5rem); margin: 0; letter-spacing: -0.02em; }
      .sub { color: rgba(255,255,255,0.5); margin-top: -1.5rem; }
      .cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
      a.card { display: block; width: 340px; max-width: 90vw; padding: 2rem; border-radius: 20px;
        text-decoration: none; color: #fff; border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.03); transition: transform .2s, border-color .2s; }
      a.card:hover { transform: translateY(-4px); }
      a.card .emoji { font-size: 2.5rem; }
      a.card h2 { margin: .75rem 0 .25rem; font-size: 1.4rem; }
      a.card p { margin: 0; color: rgba(255,255,255,0.5); font-size: .95rem; }
      .burner:hover { border-color: #ff8ae2; }
      .texts:hover { border-color: #4cc9f0; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div style="text-align:center">
        <h1>Phoebe Office Dashboards</h1>
        <p class="sub">Live from production · fun, not exact</p>
      </div>
      <div class="cards">
        <a class="card burner" href="./token-burner.html">
          <div class="emoji">🔥</div>
          <h2>Token Burner</h2>
          <p>Watch Phoebe burn LLM tokens in real time.</p>
        </a>
        <a class="card texts" href="./texts.html">
          <div class="emoji">🌎</div>
          <h2>Live Texts</h2>
          <p>Messages Phoebe sends, lighting up the map.</p>
        </a>
      </div>
    </div>
  </body>
</html>
