name: Refresh dashboard data

# Every 15 minutes: pull aggregate, PII-free stats from Phoebe production
# (Logfire) and commit the two JSON feeds. The commit triggers the deploy
# workflow, so the office TVs pick up fresh numbers.
#
# Requires repo secret LOGFIRE_READ_TOKEN (a Logfire *read* token scoped to the
# phoebe-production project). Without it this job fails and the last-good feeds
# (which are committed) keep serving.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Pull latest stats
        env:
          LOGFIRE_READ_TOKEN: ${{ secrets.LOGFIRE_READ_TOKEN }}
        run: node scripts/refresh-data.mjs
      - name: Commit updated feeds
        run: |
          git config user.name "phoebe-dashboards-bot"
          git config user.email "actions@users.noreply.github.com"
          git add dash/public/data/*.json
          if git diff --staged --quiet; then
            echo "No feed changes."
          else
            git commit -m "chore(data): refresh dashboard feeds"
            git push
          fi
