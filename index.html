  </div>
  <div id="flash"></div>
  <div id="corners">corners 0</div>
<script>
  // ---- tweakables ----
  var COLOR_CYCLE = true;   // false = stay white (brand-clean)
  var SHOW_CORNERS = true;  // tiny dim corner-hit counter, bottom-left
  var LOGO_WIDTH_VW = 0.24; // logo width as a fraction of viewport width
  var SPEED_FACTOR = 0.062; // drift speed as a fraction of the viewport diagonal / second
  var CORNER_TOL_PX = 6;    // how close to a corner still counts as a corner hit
  // --------------------

  var ASPECT = 5.4083; // width / height of the logo

  var COLORS = ['#ffffff','#ff5f6d','#ffd166','#06d6a0','#4cc9f0','#b388ff','#ff8ae2','#f9c74f'];

  // Use the masked (recolorable) element when CSS masks are supported,
  // otherwise fall back to the plain white <img> so it never goes invisible.
  var maskOk = (window.CSS && CSS.supports && (
      CSS.supports('mask-image', 'url("x")') ||
      CSS.supports('-webkit-mask-image', 'url("x")')));
  if (!COLOR_CYCLE) { maskOk = maskOk; } // mask still fine for a static white logo
  var el = maskOk ? document.getElementById('logoMask')
                  : document.getElementById('logoImg');
  el.style.display = 'block';

  var flash = document.getElementById('flash');
  var cornersEl = document.getElementById('corners');
  if (!SHOW_CORNERS) { cornersEl.style.display = 'none'; }

  var W, H, lw, lh, x, y, vx, vy;
  var colorIdx = 0, cornerHits = 0;

  function size() {
    W = window.innerWidth; H = window.innerHeight;
    lw = Math.max(150, Math.min(W * LOGO_WIDTH_VW, 560));
    lh = lw / ASPECT;
    var maxH = H * 0.4;
    if (lh > maxH) { lh = maxH; lw = lh * ASPECT; }
    el.style.width = lw + 'px';
    el.style.height = lh + 'px';
    if (x === undefined) {
      x = Math.random() * Math.max(1, W - lw);
      y = Math.random() * Math.max(1, H - lh);
    } else {
      x = Math.min(Math.max(0, x), Math.max(0, W - lw));
      y = Math.min(Math.max(0, y), Math.max(0, H - lh));
    }
  }

  function aim() {
    var speed = Math.sqrt(W * W + H * H) * SPEED_FACTOR; // px / second
    // random direction, but steer away from near-horizontal / near-vertical
    var a = Math.random() * Math.PI * 2;
    var min = 0.32; // ~18deg
    var s = Math.sin(a), c = Math.cos(a);
    if (Math.abs(s) < min) { s = (s < 0 ? -1 : 1) * min; }
    if (Math.abs(c) < min) { c = (c < 0 ? -1 : 1) * min; }
    var n = Math.sqrt(s * s + c * c);
    vx = (c / n) * speed; vy = (s / n) * speed;
  }

  function nextColor() {
    if (!COLOR_CYCLE || !maskOk) { return; }
    colorIdx = (colorIdx + 1) % COLORS.length;
    el.style.backgroundColor = COLORS[colorIdx];
  }

  function onCorner() {
    cornerHits++;
    if (SHOW_CORNERS) { cornersEl.textContent = 'corners ' + cornerHits; }
    flash.style.opacity = '0.85';
    setTimeout(function () { flash.style.opacity = '0'; }, 150);
  }

  var last = 0;
  function frame(now) {
    if (!last) { last = now; }
    var dt = (now - last) / 1000; last = now;
    if (dt > 0.1) { dt = 0.1; } // clamp big gaps (e.g. screen was asleep)

    x += vx * dt; y += vy * dt;

    var bx = false, by = false;
    if (x <= 0) { x = 0; vx = Math.abs(vx); bx = true; }
    else if (x + lw >= W) { x = W - lw; vx = -Math.abs(vx); bx = true; }
    if (y <= 0) { y = 0; vy = Math.abs(vy); by = true; }
    else if (y + lh >= H) { y = H - lh; vy = -Math.abs(vy); by = true; }

    if (bx || by) { nextColor(); }
    // corner = bounced on one axis while hugging an edge on the other
    var nearY = (y <= CORNER_TOL_PX) || (y + lh >= H - CORNER_TOL_PX);
    var nearX = (x <= CORNER_TOL_PX) || (x + lw >= W - CORNER_TOL_PX);
    if ((bx && nearY) || (by && nearX)) { onCorner(); }

    el.style.transform = 'translate(' + x + 'px,' + y + 'px)';
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', function () { size(); });
  size();
  aim();
  requestAnimationFrame(frame);
</script>
